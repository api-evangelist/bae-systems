description: >-
  BAE Systems is a British multinational defense, security, and aerospace
  company and one of the largest defense contractors globally. BAE Systems
  does not publish public developer APIs; technology integration is delivered
  through classified and ITAR-controlled customer programs, the Discover
  supplier portal, defense-program-specific data exchanges (e.g. F-35 ALIS /
  ODIN, Eurofighter), and FMS / government-to-government channels.
